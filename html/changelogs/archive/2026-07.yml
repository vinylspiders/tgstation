2026-07-10:
  FalloutFalcon:
  - server: status topic reports hostby config if we have no true world.host
  Jacquerel:
  - balance: Heparin and Nitrous Oxide now make nosebleeds worse, and also make you
      bleed more if someone very convincing tells you to start doing it.
  Melbert:
  - bugfix: Fix strong arm removal
  - balance: Knockdown, stun, and paralyze now have a 66% chance to interrupt speech
      (down from 100%)
