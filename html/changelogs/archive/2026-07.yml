  Ghommie:
  - refactor: refactored food categories (the stuff that tells you if a food item
      is made of meat, fruits, veggies etc, when examined among other things) a little,
      allowing them to be passed down to the results of cooking or processing food
      with a kitchen utensil as well, and not just during crafting.
  Melbert:
  - bugfix: Airlock pump "timeout" period no longer gets frozen alongside atmos itself,
      meaning airlock pumps will always consistently open after ten seconds, no matter
      if atmos is struggling
  - bugfix: Fixes some niche issues with settler/spacer looking off
  - bugfix: Spacer is visible in prefs
  - balance: 'Suffocation damage is slightly more consistent now: You take 3 oxyloss
      per suffocation tick, reduced for partially successful breaths and or if you
      are in crit. Alternatively, if you are in crit and you have epinephrine/atropine
      in your system, it gets nullified entirely.'
  - code_imp: Cleaned up lungs a bit, particularly relating to abnormal lungs like
      plasmamen or fish, report any oddities with them.
  - rscdel: You no longer have a chance to gasp twice in one suffocation tick.
  - refactor: Surprise, a follow up refactor to species part rendering, report any
      oddities with them (wings/snouts/tails/etc)
  - balance: 'Cursed: Vending machines will have a chance to tip over onto you when
      you purchase something, rather than passively as you walk around them.'
  - balance: 'Cursed: Airlocks will now have a chance to crush you if you stand on
      them when they try to close, rather than passively as you walk through them.'
  - balance: 'Cursed: Nearby light fixtures will now have a chance to shock you if
      they break or are turned on/off, rather than passively as you walk around them.'
  - balance: 'Cursed: Mirror reaction will only trigger if you step up to a mirror,
      rather than if you step within two tiles of a mirror.'
  - spellcheck: 'Cursed: Several chat feedback messages have been rewritten to be
      less "overt" about their nature. (More "final destination", less "a demon is
      haunting you".)'
  - admin: Bad luck smite set to "permanent" can no longer be removed by chaplains.
  - admin: Bad luck smite set to "permanent" won't gib the guy on death if they've
      experienced one bad luck event.
  - refactor: Cursed/omen/bad luck has been refactored, report any oddities with it.
