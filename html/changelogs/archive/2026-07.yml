  - bugfix: Fixed Traitor Crossbow reload being instant.
  - qol: Engi Modsuits can now hold crossbows in their suit storage slot. I thought
      they could already.
  - qol: Makeshift rebar quivers can now reload via a GUI button like the syndicate
      one, but take longer and must be stationary to do so.
  Melbert:
  - rscdel: Fixed jaws of recovery being able to be stored in the paramedic EMT belt
  TealSeer:
  - bugfix: fixed being unable to view/modify trim accesses in Access Management app
  lelandkemble:
  - map: There's no longer a missing pipe in the disposals loop on icebox
  - bugfix: hand teleporters can now close portals
  timothymtorres:
  - balance: Upload computers in AI Upload Areas no longer require command IDs to
      use.
  vinylspiders:
  - code_imp: tgui-core bumped to v6.1, please report any tgui-related issues
